</div><script>
const API = 'https://sj-server-1.onrender.com';
const ROOMS={bomj:{name:'Бомж',min:1,max:50},classic:{name:'Классик',min:10,max:500},major:{name:'Мажор',min:250,max:5000},hyena:{name:'Гиена',min:5000,max:25000}};
const COLORS=['#f87171','#fb923c','#fbbf24','#a3e635','#34d399','#22d3ee','#60a5fa','#a78bfa','#f472b6','#e879f9'];
const NAMES=['Crypto','TapMon','CoinH','GoldD','Lucky','TonRi','MegaT','FastC','BigWi'];
const TICKETS_PER_COIN=10,AVATAR_STEP=10,HOUSE_FEE=0.10;
const RANKS=[{name:'Новичок',bets:0,dep:0,bonus:0},{name:'Любитель',bets:1000,dep:500,bonus:50},{name:'Игрок',bets:5000,dep:1500,bonus:100},{name:'Хайроллер',bets:15000,dep:5000,bonus:300},{name:'Элита',bets:50000,dep:15000,bonus:800},{name:'Легенда',bets:150000,dep:50000,bonus:1500}];

let userId=null,username='Player',currentRoom='bomj',balance=500,myBet=0,isSpinning=false,spinTimer=null,spinOffset=0;
let roomState={bomj:{bank:0,players:[],timer:30,maxTimer:30},classic:{bank:0,players:[],timer:30,maxTimer:30},major:{bank:0,players:[],timer:30,maxTimer:30},hyena:{bank:0,players:[],timer:30,maxTimer:30}};
let chatMessages=[{id:1,author:'SJ',color:'#888',text:'Добро пожаловать в SJ CASINO!',isAdmin:true}],winnersHistory=[],transactions=[];
let profileNick='Player',profileAvatarColor='#b8a9ff',profileAvatarInit='S',totalBets=0,totalDeposit=0;
let captchaResolve=null,notifications=[];

// Telegram auth
if(window.Telegram?.WebApp?.initDataUnsafe?.user){
  const u=window.Telegram.WebApp.initDataUnsafe.user;
  userId=u.id;username=u.username||u.first_name||'Player';
}else{userId='demo_'+Math.floor(Math.random()*1000000)}

async function api(endpoint,data={}){
  try{
    const r=await fetch(API+endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,username,...data})});
    return await r.json();
  }catch(e){return{error:'Нет связи'}}
}

async function init(){
  const d=await api('/api/init');
  if(d.user){balance=d.user.balance;username=d.user.nick||username;totalBets=d.user.total_bets||0;totalDeposit=d.user.total_deposit||0}
  if(d.rooms){for(const[id,room]of Object.entries(d.rooms)){roomState[id]=room}}
  updateUI()
}

function updateUI(){
  const room=roomState[currentRoom]||{bank:0,timer:30,players:[]};
  const cfg=ROOMS[currentRoom];
  document.getElementById('roomTitle').textContent=cfg.name;
  document.getElementById('totalBank').textContent=(room.bank||0).toLocaleString();
  document.getElementById('playerCount').textContent='Участников: '+(room.players?room.players.length:0);
  document.getElementById('timerFill').style.width=((room.timer||0)/(room.maxTimer||30)*100)+'%';
  document.getElementById('timerText').textContent='До розыгрыша: 0:'+String(room.timer||0).padStart(2,'0');
  document.getElementById('myBetDisplay').textContent=myBet;
  const totalBet=(room.bank||0)+myBet;
  document.getElementById('myChance').textContent=totalBet>0?((myBet/totalBet)*100).toFixed(1)+'%':'0%';
  document.getElementById('myTicketRange').textContent=(myBet*TICKETS_PER_COIN).toLocaleString();
  document.getElementById('limitDisplay').textContent=myBet+'/'+cfg.max;
  document.getElementById('balanceDisplay')&&(document.getElementById('balanceDisplay').textContent=balance.toLocaleString());
  document.getElementById('walletBalance').textContent=balance.toLocaleString();
  document.getElementById('navBalance').textContent=balance.toLocaleString();
  document.getElementById('profileNickname').textContent=username;
  document.getElementById('profileAvatar').textContent=username.substring(0,2).toUpperCase();
  document.getElementById('statBets').textContent=totalBets;
  document.getElementById('statDeposit').textContent=totalDeposit;
  updateRankUI();
  renderSlotTrack();
  renderHistory();
  renderWinners();
  renderWalletTx();
}

function updateRankUI(){
  let idx=0;
  for(let i=RANKS.length-1;i>=0;i--){if(totalBets>=RANKS[i].bets&&totalDeposit>=RANKS[i].dep){idx=i;break}}
  document.getElementById('profileRank').textContent='Ранг: '+RANKS[idx].name;
  const next=idx<RANKS.length-1?RANKS[idx+1]:null;
  if(next){
    const p=Math.min(100,Math.floor((totalBets/next.bets)*100));
    document.getElementById('rankFillBets').style.width=p+'%';
  }else{document.getElementById('rankFillBets').style.width='100%'}
}

function renderSlotTrack(){
  const room=roomState[currentRoom];
  let all=[...room.players];
  if(myBet>0)all.push({name:username,color:profileAvatarColor,bet:myBet,tickets:myBet*TICKETS_PER_COIN,isYou:true});
  let html='';
  for(let cycle=0;cycle<3;cycle++){
    for(const p of all){
      const slots=Math.max(1,Math.floor((p.tickets||p.bet*TICKETS_PER_COIN)/AVATAR_STEP));
      const init=p.name?p.name.substring(0,2).toUpperCase():'??';
      for(let s=0;s<slots;s++){
        html+='<div class="slot-item"><div class="slot-avatar" style="background:'+(p.color||'#888')+(p.isYou?'box-shadow:0 0 10px rgba(184,169,255,.5)':'')+'">'+init+'</div></div>';
      }
    }
  }
  const track=document.getElementById('slotTrack');
  track.innerHTML=html;
  track.style.transition='none';
  track.style.transform='translateX('+spinOffset+'px)';
}

function renderHistory(){
  const room=roomState[currentRoom];
  let all=[...room.players];
  if(myBet>0)all.push({name:username,color:profileAvatarColor,bet:myBet,tickets:myBet*TICKETS_PER_COIN,isYou:true});
  const totalBet=(room.bank||0)+myBet;
  let startTicket=0,html='';
  for(const p of all){
    const tickets=p.tickets||p.bet*TICKETS_PER_COIN;
    const end=startTicket+tickets-1;
    const chance=totalBet>0?((p.bet/totalBet)*100).toFixed(1):'0';
    html+='<div class="history-item'+(p.isYou?' win':'')+'"><div class="history-avatar" style="background:'+(p.color||'#888')+'">'+(p.name?p.name.substring(0,2).toUpperCase():'??')+'</div><div class="history-name">'+p.name+(p.isYou?' (Вы)':'')+'</div><div class="history-chance">'+chance+'%</div></div>';
    startTicket=end+1;
  }
  document.getElementById('historyList').innerHTML=html||'<p style="color:var(--sub);font-size:10px;text-align:center">Нет ставок</p>';
}

function renderWinners(){
  document.getElementById('winnersList').innerHTML=winnersHistory.slice(0,6).map(w=>'<div style="display:flex;justify-content:space-between;font-size:9px;padding:2px 0"><span>'+w.name+'</span><span style="color:var(--gold)">+'+w.amount.toLocaleString()+'</span></div>').join('')||'<p style="color:var(--sub);font-size:10px;text-align:center">Нет победителей</p>';
}

function renderWalletTx(){
  const c=document.getElementById('walletTxList');
  if(!transactions.length){c.innerHTML='<p style="color:var(--sub);font-size:10px;text-align:center">Нет транзакций</p>';return}
  c.innerHTML=transactions.slice(0,20).map(tx=>'<div class="tx-item"><div class="tx-row"><span>'+tx.type+'</span><span>'+tx.amount.toLocaleString()+' мон.</span></div><div class="tx-row"><span style="color:var(--sub);font-size:9px">'+tx.date+'</span><span class="tx-status '+tx.status+'">'+tx.status+'</span></div></div>').join('');
}

function genBots(roomKey){
  const room=roomState[roomKey],cfg=ROOMS[roomKey];
  room.bank=0;room.players=[];
  const n=5+Math.floor(Math.random()*7);
  for(let i=0;i<n;i++){
    const bet=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min)*0.6);
    room.players.push({name:NAMES[i%NAMES.length],color:COLORS[i%COLORS.length],bet,tickets:bet*TICKETS_PER_COIN});
    room.bank+=bet;
  }
  room.timer=room.maxTimer;
}

for(const r in roomState)genBots(r);

function tick(){
  const s=roomState[currentRoom];
  if(s.timer>0&&!isSpinning){s.timer--;updateUI()}
  if(s.timer<=0&&!isSpinning){clearInterval(spinTimer);spinTimer=null;doSpin()}
}

function startTimer(){if(spinTimer)clearInterval(spinTimer);spinTimer=setInterval(tick,1000)}

function doSpin(){
  if(isSpinning)return;isSpinning=true;
  const s=roomState[currentRoom];
  document.getElementById('winnerInfo').classList.remove('active');
  let all=[...s.players];
  if(myBet>0)all.push({name:username,color:profileAvatarColor,bet:myBet,tickets:myBet*TICKETS_PER_COIN,isYou:true});
  if(!all.length){finishSpin();return}
  const totalBet=s.bank+myBet,totalTickets=totalBet*TICKETS_PER_COIN;
  let ticket=Math.floor(Math.random()*totalTickets),cum=0,winner=all[all.length-1];
  for(const p of all){cum+=p.tickets;if(ticket<cum){winner=p;break}}
  const winChance=totalBet>0?((winner.bet/totalBet)*100).toFixed(1):'0';
  const fee=Math.floor(totalBet*HOUSE_FEE),winAmount=totalBet-fee;
  winnersHistory.unshift({name:winner.name,amount:winAmount});
  if(winnersHistory.length>20)winnersHistory.pop();
  
  if(winner.isYou){
    balance+=winAmount;
    document.getElementById('appContainer').classList.add('flash-bg');
    setTimeout(()=>document.getElementById('appContainer').classList.remove('flash-bg'),1200);
  }
  if(myBet>0){totalBets++;totalWagered=(totalWagered||0)+myBet}
  myBet=0;
  
  setTimeout(()=>{
    document.getElementById('winnerMiniAvatar').textContent=winner.name.substring(0,2).toUpperCase();
    document.getElementById('winnerMiniAvatar').style.background=winner.color||'#888';
    document.getElementById('winnerNameText').textContent=winner.name;
    document.getElementById('winnerChanceText').textContent='Шанс: '+winChance+'%';
    document.getElementById('winnerAmountText').textContent='+'+winAmount.toLocaleString();
    document.getElementById('winnerInfo').classList.add('active');
    setTimeout(finishSpin,3000);
  },2000);
}

function finishSpin(){
  isSpinning=false;
  const s=roomState[currentRoom];
  s.bank=0;s.players=[];s.timer=s.maxTimer;spinOffset=0;
  genBots(currentRoom);
  updateUI();
  if(!spinTimer)startTimer();
}

async function placeBet(){
  if(isSpinning)return;
  const amt=parseInt(document.getElementById('betAmount').value);
  const cfg=ROOMS[currentRoom];
  if(!amt||amt<cfg.min)return alert('Мин: '+cfg.min);
  if(amt>cfg.max)return alert('Макс: '+cfg.max);
  if(myBet+amt>cfg.max)return alert('Лимит: '+cfg.max);
  if(amt>balance)return alert('Нет средств');
  
  const res=await api('/api/bet',{roomId:currentRoom,amount:amt});
  if(res.error)return alert(res.error);
  balance-=amt;myBet+=amt;
  document.getElementById('betAmount').value='';
  updateUI();
}

function switchRoom(room){
  if(isSpinning)return;
  currentRoom=room;myBet=0;spinOffset=0;
  document.querySelectorAll('.room-tab').forEach((b,i)=>b.classList.toggle('active',Object.keys(ROOMS)[i]===room));
  updateUI();
}

function switchPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById(page+'Page');
  if(el)el.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const idx={jackpot:0,bonus:1,wallet:2,profile:3};
  const btns=document.querySelectorAll('.nav-item');
  if(btns[idx[page]])btns[idx[page]].classList.add('active');
  document.getElementById('roomsBar').style.display=page==='jackpot'?'flex':'none';
}

function toggleChat(){
  const p=document.getElementById('chatPanel');
  p.classList.toggle('open');
  document.getElementById('chatOverlay').classList.toggle('active',p.classList.contains('open'));
  if(p.classList.contains('open'))renderChat();
}

function toggleMenu(){
  const p=document.getElementById('menuPanel');
  p.classList.toggle('open');
  document.getElementById('chatOverlay').classList.toggle('active',p.classList.contains('open'));
}

function toggleNotif(){
  const p=document.getElementById('notifPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))renderNotifList();
}

function closeAllPanels(){
  document.getElementById('chatPanel').classList.remove('open');
  document.getElementById('menuPanel').classList.remove('open');
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('chatOverlay').classList.remove('active');
}

function renderChat(){
  document.getElementById('chatMessages').innerHTML=chatMessages.map(m=>'<div class="chat-msg"><div class="chat-msg-avatar" style="background:'+(m.color||'#888')+'">'+m.author.substring(0,2).toUpperCase()+'</div><div class="chat-msg-body">'+m.text+'</div></div>').join('');
}

function sendMessage(){
  const input=document.getElementById('chatInput'),text=input.value.trim();
  if(!text)return;
  chatMessages.push({id:Date.now(),author:username,color:profileAvatarColor,text});
  if(chatMessages.length>100)chatMessages.shift();
  input.value='';renderChat();
}

function renderNotifList(){
  document.getElementById('notifList').innerHTML=notifications.length?notifications.map(n=>'<div style="font-size:10px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03)">'+n.text+'<div style="font-size:8px;color:var(--sub)">'+n.time+'</div></div>').join(''):'<p style="color:var(--sub);font-size:10px;text-align:center">Нет уведомлений</p>';
}

function addNotification(text){
  notifications.unshift({text,time:new Date().toLocaleTimeString()});
  if(notifications.length>30)notifications.pop();
}

function openDepositModal(){document.getElementById('depositModal').classList.add('active')}
function closeDepositModal(){document.getElementById('depositModal').classList.remove('active')}
function startDepositProcess(){
  const amt=parseInt(document.getElementById('depositAmount').value)||0;
  if(!amt||amt<1)return;
  balance+=amt;totalDeposit+=amt;
  transactions.unshift({type:'Пополнение',amount:amt,status:'success',date:new Date().toLocaleString('ru-RU')});
  if(transactions.length>50)transactions.pop();
  addNotification('Баланс пополнен на +'+amt+' монет');
  closeDepositModal();
  updateUI();
}

function openWithdrawModal(){document.getElementById('withdrawModal').classList.add('active')}
function closeWithdrawModal(){document.getElementById('withdrawModal').classList.remove('active')}
function onWithdrawMethodChange(){
  const m=document.getElementById('withdrawMethod').value;
  const d=document.getElementById('withdrawMethodDetails');
  if(m==='sbp')d.innerHTML='<input type="text" id="withdrawWallet" placeholder="+79XXXXXXXXX" style="width:100%;background:#0f0f1a;border:1px solid var(--border);color:#fff;padding:8px;border-radius:8px;font-size:12px;text-align:center;margin-top:6px">';
  else if(m==='card')d.innerHTML='<input type="text" id="withdrawWallet" placeholder="0000 0000 0000 0000" style="width:100%;background:#0f0f1a;border:1px solid var(--border);color:#fff;padding:8px;border-radius:8px;font-size:12px;text-align:center;margin-top:6px">';
  else if(m==='usdt'||m==='ton')d.innerHTML='<input type="text" id="withdrawWallet" placeholder="Адрес кошелька" style="width:100%;background:#0f0f1a;border:1px solid var(--border);color:#fff;padding:8px;border-radius:8px;font-size:12px;text-align:center;margin-top:6px">';
  else d.innerHTML='';
}

function requestWithdraw(){
  const amt=parseInt(document.getElementById('withdrawAmount').value)||0;
  const method=document.getElementById('withdrawMethod').value;
  const wallet=(document.getElementById('withdrawWallet')?.value||'').trim();
  if(amt<1500)return alert('Мин: 1500');
  if(amt>balance)return alert('Нет средств');
  if(!method)return alert('Выбери способ');
  if(!wallet)return alert('Введи реквизиты');
  balance-=amt;
  transactions.unshift({type:'Вывод',amount:amt,status:'processing',date:new Date().toLocaleString('ru-RU')});
  if(transactions.length>50)transactions.pop();
  addNotification('Заявка на вывод '+amt+' монет создана');
  closeWithdrawModal();
  updateUI();
}

function startPromoCaptcha(){
  const code=document.getElementById('promoInput').value.trim().toUpperCase();
  if(!code)return;
  const a=Math.floor(Math.random()*20)+1,b=Math.floor(Math.random()*20)+1;
  document.getElementById('captchaQuestion').textContent=a+' + '+b+' = ?';
  document.getElementById('captchaAnswer').value='';
  document.getElementById('captchaOverlay').classList.add('active');
  captchaResolve=()=>{
    const bonus=10;
    balance+=bonus;totalDeposit+=bonus;
    transactions.unshift({type:'Промокод',amount:bonus,status:'success',date:new Date().toLocaleString('ru-RU')});
    document.getElementById('promoMsg').textContent='Активирован! +'+bonus;
    document.getElementById('promoMsg').style.color='var(--green)';
    document.getElementById('promoInput').value='';
    updateUI();
  };
}

function submitCaptcha(){
  document.getElementById('captchaOverlay').classList.remove('active');
  if(captchaResolve){captchaResolve();captchaResolve=null}
}

function showRanksModal(){
  document.getElementById('ranksContent').innerHTML=RANKS.map(r=>'<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:10px"><strong>'+r.name+'</strong> — Ставок: '+r.bets.toLocaleString()+' / Деп: '+r.dep.toLocaleString()+' — Бонус: <span style="color:var(--gold)">+'+r.bonus+'</span></div>').join('');
  document.getElementById('ranksModal').classList.add('active');
}

function closeRanksModal(){document.getElementById('ranksModal').classList.remove('active')}

function showInfoModal(type){
  const t=document.getElementById('infoModalTitle'),c=document.getElementById('infoModalContent');
  if(type==='rules'){t.textContent='Правила';c.innerHTML='1. Ставки в монетах SJ.<br>2. 1 монета = 10 билетов.<br>3. Победитель — случайно.<br>4. Комиссия — 10%.'}
  else if(type==='support'){t.textContent='Поддержка';c.innerHTML='По вопросам: @support<br>10:00-22:00 МСК'}
  document.getElementById('infoModal').classList.add('active');
}

function closeInfoModal(){document.getElementById('infoModal').classList.remove('active')}

// Инициализация
init();startTimer();updateUI();renderChat();
setInterval(init,5000);

// Enter в инпутах
document.getElementById('betAmount').addEventListener('keydown',e=>{if(e.key==='Enter')placeBet()});
document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage()});
document.getElementById('promoInput').addEventListener('keydown',e=>{if(e.key==='Enter')startPromoCaptcha()});
document.getElementById('captchaAnswer').addEventListener('keydown',e=>{if(e.key==='Enter')submitCaptcha()});
</script></body></html>
