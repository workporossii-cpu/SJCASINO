<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SJ CASINO</title>
    <style>
        :root {
            --bg: #0b0d12;
            --card: #151922;
            --accent: #a970ff;
            --accent2: #8b5cf6;
            --text: #e4e4e7;
            --sub: #71717a;
            --gold: #f0b90b;
            --green: #4ade80;
            --red: #f44336;
            --orange: #ff9800;
            --border: #252830;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .app { width: 100%; max-width: 420px; min-height: 100vh; display: flex; flex-direction: column; padding: 0 12px 100px; position: relative; }
        .top-divider { display: flex; align-items: center; justify-content: space-between; padding: 12px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .top-logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
        .rooms { display: flex; gap: 4px; margin: 8px 0; }
        .room-tab { flex: 1; background: #111318; border: 1px solid var(--border); color: #71717a; padding: 10px 4px; border-radius: 8px; font-size: 9px; cursor: pointer; text-align: center; text-transform: uppercase; }
        .room-tab.active { background: rgba(169,112,255,0.1); color: var(--accent); border-color: var(--accent2); }
        .room-tab .limits { font-size: 7px; color: #555; margin-top: 3px; }
        .jackpot-header { text-align: center; margin-bottom: 4px; }
        .jackpot-title { font-size: 15px; font-weight: 600; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .jackpot-bank { font-size: 28px; font-weight: 700; color: var(--gold); margin: 4px 0; }
        .timer-bar { background: #111318; border-radius: 4px; height: 3px; margin: 8px 0; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--accent2); border-radius: 4px; transition: width 1s linear; }
        .timer-text { text-align: center; font-size: 9px; color: var(--sub); }
        .slot-container { position: relative; width: 100%; height: 80px; overflow: hidden; margin: 4px 0; background: #0f1117; border-radius: 6px; }
        .slot-pointer { position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); width: 2px; z-index: 10; background: rgba(169,112,255,0.5); }
        .slot-track { display: flex; gap: 0; position: absolute; left: 0; top: 8px; }
        .slot-item { flex-shrink: 0; width: 38px; height: 48px; display: flex; align-items: center; justify-content: center; }
        .slot-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; transition: transform 0.5s ease, opacity 0.4s ease; }
        .slot-avatar.flip { transform: rotateX(360deg); }
        .slot-avatar.dimmed { opacity: 0.2; }
        .winner-info { display: none; text-align: center; padding: 10px 0; }
        .winner-info.active { display: block; }
        .bet-area { display: flex; gap: 8px; margin-top: 10px; }
        .bet-input { flex: 1; background: #0f1117; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; }
        .bet-btn { background: var(--accent2); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; }
        .bet-btn:active { background: #7c3aed; }
        .my-bet-info { font-size: 9px; color: #777; margin-top: 4px; display: flex; justify-content: space-between; }
        .history-block { margin-top: 12px; background: var(--card); border-radius: 10px; padding: 12px; border: 1px solid var(--border); max-height: 140px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 9px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .winners-block { margin-top: 12px; background: var(--card); border-radius: 10px; padding: 12px; border: 1px solid var(--border); }
        .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: #0d0d16; display: flex; justify-content: space-around; padding: 8px 6px 20px; border-top: 1px solid var(--border); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 8px; color: #5a5a6e; cursor: pointer; background: none; border: none; padding: 4px 8px; border-radius: 6px; }
        .nav-item.active { color: var(--accent); }
        .balance-bubble { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); background: #151922; border: 1px solid var(--accent2); border-radius: 8px 8px 0 0; padding: 5px 12px; font-size: 10px; font-weight: 600; color: var(--gold); }
        .page { display: none; }
        .page.active { display: block; }
        .chat-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: #0f1117; border-left: 1px solid var(--border); z-index: 200; transition: right 0.3s ease; display: flex; flex-direction: column; padding: 12px; }
        .chat-panel.open { right: 0; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-bottom: 40px; }
        .chat-input-row { display: flex; gap: 6px; margin-top: 8px; }
        .chat-input-row input { flex: 1; background: #111318; border: 1px solid var(--border); color: #fff; padding: 8px 10px; border-radius: 8px; font-size: 11px; }
        .chat-input-row button { background: var(--accent2); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 199; }
        .overlay.active { display: block; }
    </style>
</head>
<body>
<div class="app" id="appContainer">
    <div class="top-divider">
        <div class="top-logo">SJ</div>
        <button class="burger-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    </div>
    <div class="rooms" id="roomsBar">
        <button class="room-tab active" onclick="switchRoom('bomj')">Бомж<div class="limits">1-50</div></button>
        <button class="room-tab" onclick="switchRoom('classic')">Классик<div class="limits">10-500</div></button>
        <button class="room-tab" onclick="switchRoom('major')">Мажор<div class="limits">250-5K</div></button>
        <button class="room-tab" onclick="switchRoom('hyena')">Гиена<div class="limits">5K-25K</div></button>
    </div>

    <div class="page active" id="jackpotPage">
        <div class="jackpot-header">
            <div class="jackpot-title" id="roomTitle">Бомж</div>
            <div class="jackpot-bank" id="totalBank">0</div>
            <div class="jackpot-players" id="playerCount">Участников: 0</div>
        </div>
        <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:0%"></div></div>
        <div class="timer-text" id="timerText">Загрузка...</div>
        <div class="slot-container"><div class="slot-pointer"></div><div class="slot-track" id="slotTrack"></div></div>
        <div class="winner-info" id="winnerInfo">
            <div class="winner-name" id="winnerNameText"></div>
            <div class="winner-amount" id="winnerAmountText"></div>
        </div>
        <div class="bet-area">
            <input class="bet-input" type="number" id="betAmount" placeholder="Сумма">
            <button class="bet-btn" onclick="placeBet()">→</button>
        </div>
        <div class="my-bet-info">
            <span>Ставка: <strong id="myBetDisplay">0</strong></span>
            <span>Баланс: <strong id="balanceDisplay">0</strong></span>
        </div>
        <div class="history-block"><h4>Участники</h4><div id="historyList"></div></div>
        <div class="winners-block"><h4>Победители</h4><div id="winnersList"></div></div>
    </div>

    <div class="page" id="walletPage">
        <div class="wallet-card">
            <h3>💰 Кошелёк</h3>
            <p style="font-size:28px;font-weight:700;color:var(--gold);text-align:center" id="walletBalance">0</p>
        </div>
    </div>

    <div class="page" id="profilePage">
        <div class="profile-card">
            <h3>👤 Профиль</h3>
            <p style="text-align:center" id="profileNickname">Player</p>
        </div>
    </div>
</div>

<div class="overlay" id="chatOverlay" onclick="toggleChat()"></div>
<div class="chat-panel" id="chatPanel">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="color:var(--accent);font-weight:600">Чат</span>
        <button onclick="toggleChat()" style="background:none;border:none;color:#888;font-size:20px">×</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Сообщение...">
        <button onclick="sendMessage()">→</button>
    </div>
</div>

<div class="nav">
    <button class="nav-item active" onclick="switchPage('jackpot')">🎰 Игра</button>
    <button class="nav-item" onclick="switchPage('wallet')">💰 Кошелёк</button>
    <button class="nav-item" onclick="switchPage('profile')">👤 Профиль</button>
    <button class="nav-item" onclick="toggleChat()">💬 Чат</button>
    <span class="balance-bubble" id="navBalance">0</span>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io('https://sj-server-v2.onrender.com', {
    auth: { token: localStorage.getItem('token') || 'demo' }
});

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let userId = 'demo_user';
let username = 'Player';
let balance = 0;
let currentRoom = 'bomj';
let myBet = 0;
let isSpinning = false;
let roomsData = {};
let chatMessages = [];
let winnersHistory = [];

if (tg?.initDataUnsafe?.user) {
    userId = tg.initDataUnsafe.user.id;
    username = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || 'Player';
}

// WebSocket: состояние комнат
socket.on('room_state', (rooms) => {
    roomsData = rooms;
    updateUI();
});

// WebSocket: новая ставка
socket.on('new_bet', ({ roomId }) => {
    if (roomId === currentRoom) {
        // обновим UI при следующем room_state
    }
});

// WebSocket: начало раунда
socket.on('round_start', ({ roomId }) => {
    if (roomId === currentRoom) {
        isSpinning = true;
    }
});

// WebSocket: конец раунда
socket.on('round_end', ({ roomId, winner }) => {
    if (roomId === currentRoom) {
        isSpinning = false;
        winnersHistory.unshift({ name: winner.name, amount: winner.amount, room: roomId });
        if (winnersHistory.length > 20) winnersHistory.pop();
        showWinner(winner);
    }
});

// WebSocket: новое сообщение
socket.on('new_message', (msg) => {
    chatMessages.push(msg);
    renderChat();
});

// WebSocket: обновление баланса
socket.on('balance_update', ({ balance: newBalance }) => {
    balance = newBalance;
    updateBalanceDisplay();
});

// WebSocket: персональный выигрыш
socket.on('user_won', ({ amount }) => {
    alert(`🎉 Вы выиграли ${amount.toLocaleString()} монет!`);
});

// WebSocket: ошибка
socket.on('error', ({ message }) => {
    alert(message);
});

function updateUI() {
    const room = roomsData[currentRoom] || { bank: 0, timer: 0, maxTimer: 30, players: [], lastWinner: null };
    document.getElementById('roomTitle').textContent = {bomj:'Бомж',classic:'Классик',major:'Мажор',hyena:'Гиена'}[currentRoom];
    document.getElementById('totalBank').textContent = (room.bank || 0).toLocaleString();
    document.getElementById('playerCount').textContent = 'Участников: ' + (room.players ? room.players.length : 0);
    document.getElementById('timerFill').style.width = ((room.timer || 0) / (room.maxTimer || 30) * 100) + '%';
    document.getElementById('timerText').textContent = 'До розыгрыша: 0:' + String(room.timer || 0).padStart(2, '0');
    document.getElementById('myBetDisplay').textContent = myBet;

    let histHTML = '';
    if (room.players) {
        for (const p of room.players) {
            histHTML += `<div class="history-item"><div class="history-avatar" style="background:${p.color || '#888'}">${(p.name||'??').substring(0,2).toUpperCase()}</div><span>${p.name}</span><span>${(p.bet||0)} мон.</span></div>`;
        }
    }
    document.getElementById('historyList').innerHTML = histHTML || 'Нет ставок';

    let winHTML = '';
    winnersHistory.slice(0, 5).forEach(w => {
        winHTML += `<div class="winner-entry"><span>${w.name}</span><span style="color:var(--gold)">+${w.amount.toLocaleString()}</span></div>`;
    });
    document.getElementById('winnersList').innerHTML = winHTML || 'Нет победителей';
}

function updateBalanceDisplay() {
    document.getElementById('balanceDisplay').textContent = balance.toLocaleString();
    document.getElementById('walletBalance').textContent = balance.toLocaleString();
    document.getElementById('navBalance').textContent = balance.toLocaleString();
}

function showWinner(winner) {
    document.getElementById('winnerNameText').textContent = winner.name;
    document.getElementById('winnerAmountText').textContent = '+' + winner.amount.toLocaleString() + ' мон.';
    document.getElementById('winnerInfo').classList.add('active');
    setTimeout(() => document.getElementById('winnerInfo').classList.remove('active'), 5000);
    updateBalanceDisplay();
}

function placeBet() {
    const amt = parseInt(document.getElementById('betAmount').value);
    if (!amt || amt < 1) return alert('Введи сумму');
    socket.emit('place_bet', {
        roomId: currentRoom,
        amount: amt,
        token: localStorage.getItem('token') || 'demo'
    });
    myBet += amt;
    document.getElementById('betAmount').value = '';
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    socket.emit('send_message', {
        text,
        token: localStorage.getItem('token') || 'demo'
    });
    input.value = '';
}

function renderChat() {
    const container = document.getElementById('chatMessages');
    container.innerHTML = chatMessages.slice(-50).map(m => `
        <div class="chat-msg">
            <div class="chat-msg-body">${m.text}</div>
        </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
}

function switchRoom(room) {
    currentRoom = room;
    myBet = 0;
    document.querySelectorAll('.room-tab').forEach((b, i) => b.classList.toggle('active', Object.keys({bomj:0,classic:1,major:2,hyena:3})[room] === i));
}

function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page + 'Page').classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.nav-item')[[{jackpot:0,wallet:1,profile:2}[page]]].classList.add('active');
    document.getElementById('roomsBar').style.display = page === 'jackpot' ? 'flex' : 'none';
}

function toggleChat() {
    const panel = document.getElementById('chatPanel');
    const overlay = document.getElementById('chatOverlay');
    panel.classList.toggle('open');
    overlay.classList.toggle('active');
}

document.getElementById('betAmount').addEventListener('keydown', e => { if (e.key === 'Enter') placeBet(); });
document.getElementById('chatInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
