<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>SEMAKA Jackpot</title><style>:root{--bg:#0a0a12;--card:#14141f;--accent:#b8a9ff;--accent2:#7c6fd4;--text:#e0e0e8;--sub:#666680;--gold:#f0b90b;--green:#5ee7a0;--red:#f87171;--orange:#f59e0b;--border:#1e1e2e}*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;overflow-y:auto;overflow-x:hidden}.app{width:100%;max-width:420px;min-height:100vh;display:flex;flex-direction:column;padding:0 12px 100px;position:relative}.top-divider{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 6px;border-bottom:1px solid rgba(255,255,255,.04);min-height:36px}.top-logo-placeholder{font-size:12px;color:var(--accent);font-weight:700}.burger-btn{display:flex;flex-direction:column;gap:4px;cursor:pointer;padding:4px;background:none;border:none}.burger-btn span{display:block;width:20px;height:2px;background:#888;border-radius:2px}.rooms{display:flex;gap:5px;margin:8px 0}.room-tab{flex:1;background:#10101a;border:1px solid var(--border);color:#555;padding:9px 3px;border-radius:10px;font-size:10px;cursor:pointer;text-align:center;transition:.2s;font-weight:600}.room-tab.active{background:#1a1a2e;color:var(--accent);border-color:var(--accent2)}.room-tab .limits{font-size:8px;color:#555;margin-top:2px}.room-tab.active .limits{color:#888}.jackpot-header{text-align:center;margin-bottom:2px}.jackpot-title{font-size:18px;font-weight:800;color:#fff}.jackpot-subtitle{font-size:10px;color:var(--sub)}.jackpot-bank{font-size:26px;font-weight:900;color:var(--gold);margin:2px 0}.jackpot-players{font-size:10px;color:var(--sub);margin-bottom:6px}.timer-bar{background:#10101a;border-radius:10px;height:5px;margin:6px 0;overflow:hidden}.timer-fill{height:100%;background:var(--accent2);border-radius:10px;transition:width 1s linear}.timer-text{text-align:center;font-size:10px;color:var(--sub);margin-bottom:4px}.slot-container{position:relative;width:100%;height:70px;overflow:hidden;margin:2px 0;background:rgba(0,0,0,.15);border-radius:8px}.slot-track{display:flex;gap:0;position:absolute;left:0;top:8px;transition:transform 0.3s ease}.slot-item{flex-shrink:0;width:40px;height:50px;display:flex;align-items:center;justify-content:center}.slot-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}.winner-info{display:none;text-align:center;padding:8px 0 4px}.winner-info.active{display:block}.winner-info .winner-row{display:flex;align-items:center;justify-content:center;gap:10px}.winner-info .winner-amount{font-size:18px;font-weight:900;color:var(--gold)}.bet-area{display:flex;gap:6px;align-items:center;margin-top:8px}.bet-input{flex:1;background:#0f0f1a;border:1px solid var(--border);color:#fff;padding:10px 12px;border-radius:10px;font-size:13px;text-align:center}.bet-btn{background:var(--accent2);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-weight:700;font-size:18px;cursor:pointer}.bet-btn:active{background:#6a5fc0}.my-bet-info{font-size:9px;color:var(--sub);margin-top:3px;display:flex;justify-content:space-between}.limit-info{font-size:9px;color:var(--sub);text-align:right;margin-top:2px}.history-block{margin-top:10px;background:var(--card);border-radius:12px;padding:10px;border:1px solid var(--border);max-height:130px;overflow-y:auto}.history-block h4{font-size:11px;color:var(--sub);margin-bottom:6px;text-align:center}.history-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:9px;border-bottom:1px solid rgba(255,255,255,.03)}.history-avatar{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0}.history-name{flex:1;color:#ccc}.history-chance{color:var(--sub);width:40px;text-align:right}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#0d0d18;display:flex;justify-content:space-around;padding:6px 6px 18px;border-top:1px solid var(--border);z-index:100}.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:8px;color:#444;cursor:pointer;background:none;border:none;padding:4px 6px;border-radius:10px}.nav-item.active{color:var(--accent)}.balance-bubble{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--accent2);border-bottom:none;border-radius:12px 12px 0 0;padding:4px 10px;font-size:10px;font-weight:700;color:var(--gold);white-space:nowrap}.promo-section{padding:20px;display:none}.promo-section.active{display:block}.promo-input{width:100%;background:#0f0f1a;border:1px solid var(--border);color:#fff;padding:10px;border-radius:10px;font-size:13px;text-align:center;margin-bottom:8px}.promo-btn{width:100%;background:var(--accent2);color:#fff;border:none;padding:10px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer}.promo-msg{font-size:10px;text-align:center;margin-top:4px;min-height:14px}.leaderboard{padding:20px;display:none}.leaderboard.active{display:block}.lb-item{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid var(--border);font-size:12px}.lb-pos{color:var(--accent);font-weight:700;width:30px}.lb-name{flex:1}.lb-balance{color:var(--gold)}</style></head><body><div class="app" id="appContainer"><div class="top-divider"><div class="top-logo-placeholder">SEMAKA</div></div><div class="rooms" id="roomsBar"><button class="room-tab active" onclick="switchRoom('bomj')">Бомж<div class="limits">1–50</div></button><button class="room-tab" onclick="switchRoom('classic')">Классик<div class="limits">10–500</div></button><button class="room-tab" onclick="switchRoom('major')">Мажор<div class="limits">250–5000</div></button><button class="room-tab" onclick="switchRoom('hyena')">Гиена<div class="limits">5000–25000</div></button></div><div id="jackpotPage"><div class="jackpot-header"><div class="jackpot-title" id="roomTitle">Бомж</div><div class="jackpot-subtitle">Общий банк</div><div class="jackpot-bank" id="totalBank">0</div><div class="jackpot-players" id="playerCount">Участников: 0</div></div><div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div><div class="timer-text" id="timerText">Загрузка...</div><div class="slot-container"><div class="slot-track" id="slotTrack"></div></div><div class="winner-info" id="winnerInfo"><div class="winner-row"><div class="winner-amount" id="winnerAmountText"></div></div></div><div class="bet-area"><input class="bet-input" type="number" id="betAmount" placeholder="Сумма ставки" min="1"><button class="bet-btn" onclick="placeBet()">&rarr;</button></div><div class="my-bet-info"><span>Твоя ставка: <strong id="myBetDisplay">0</strong></span><span>Баланс: <strong id="balanceDisplay">500</strong></span></div><div class="limit-info">Лимит: <span id="limitDisplay">0/50</span></div><div class="history-block"><h4>Участники:</h4><div id="historyList"><p style="color:var(--sub);font-size:10px;text-align:center;">Загрузка...</p></div></div></div><div class="promo-section" id="promoPage"><h3 style="color:var(--accent);text-align:center;margin-bottom:12px">Промокод</h3><input class="promo-input" type="text" id="promoInput" placeholder="Введи промокод"><button class="promo-btn" onclick="activatePromo()">Активировать</button><p class="promo-msg" id="promoMsg"></p></div><div class="leaderboard" id="leaderboardPage"><h3 style="color:var(--accent);text-align:center;margin-bottom:12px">Топ игроков</h3><div id="lbList">Загрузка...</div></div><div class="nav"><button class="nav-item active" onclick="switchPage('jackpot')">🎰 Игра</button><button class="nav-item" onclick="switchPage('promo')">🎁 Промо</button><button class="nav-item" onclick="switchPage('leaderboard')">🏆 Топ</button><span class="balance-bubble" id="navBalance">500</span></div></div><script>
const API = 'https://sj-server-1.onrender.com';
let userId = null;
let username = 'Player';
let currentRoom = 'bomj';
let balance = 500;
let roomsData = {};
let myBets = {};

// Получаем данные из Telegram WebApp
if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
  const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
  userId = tgUser.id;
  username = tgUser.username || tgUser.first_name || 'Player';
} else {
  userId = 'demo_' + Math.floor(Math.random() * 1000000);
}

async function apiCall(endpoint, data = {}) {
  try {
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, username, ...data })
    });
    return await res.json();
  } catch(e) {
    console.error(e);
    return { error: 'Нет связи с сервером' };
  }
}

async function init() {
  const data = await apiCall('/api/init');
  if (data.error) { alert(data.error); return; }
  if (data.user) {
    balance = data.user.balance;
    username = data.user.nick || username;
  }
  if (data.rooms) {
    roomsData = data.rooms;
    myBets = {};
    for (const roomId in roomsData) {
      const room = roomsData[roomId];
      for (const p of room.players) {
        if (!p.isBot && p.userId == userId) {
          myBets[roomId] = (myBets[roomId] || 0) + p.bet;
        }
      }
    }
  }
  updateUI();
}

function updateUI() {
  const room = roomsData[currentRoom] || { bank: 0, timer: 30, maxTimer: 30, players: [] };
  const cfg = { bomj:{min:1,max:50}, classic:{min:10,max:500}, major:{min:250,max:5000}, hyena:{min:5000,max:25000} }[currentRoom];
  
  document.getElementById('roomTitle').textContent = {bomj:'Бомж',classic:'Классик',major:'Мажор',hyena:'Гиена'}[currentRoom];
  document.getElementById('totalBank').textContent = (room.bank || 0).toLocaleString();
  document.getElementById('playerCount').textContent = 'Участников: ' + (room.players ? room.players.length : 0);
  document.getElementById('timerFill').style.width = ((room.timer || 0) / (room.maxTimer || 30) * 100) + '%';
  document.getElementById('timerText').textContent = 'До розыгрыша: 0:' + String(room.timer || 0).padStart(2,'0');
  
  const myBet = myBets[currentRoom] || 0;
  document.getElementById('myBetDisplay').textContent = myBet;
  document.getElementById('balanceDisplay').textContent = balance.toLocaleString();
  document.getElementById('navBalance').textContent = balance.toLocaleString();
  document.getElementById('limitDisplay').textContent = myBet + '/' + (cfg ? cfg.max : 50);
  
  // Участники
  let html = '';
  if (room.players) {
    for (const p of room.players) {
      const initName = p.name ? p.name.substring(0,2).toUpperCase() : '??';
      const isYou = !p.isBot && p.userId == userId;
      html += '<div class="history-item' + (isYou ? ' win' : '') + '"><div class="history-avatar" style="background:' + (p.color || '#888') + '">' + initName + '</div><div class="history-name">' + p.name + (isYou ? ' (Вы)' : '') + '</div><div class="history-chance">' + (p.bet || 0).toLocaleString() + ' мон.</div></div>';
    }
  }
  document.getElementById('historyList').innerHTML = html || '<p style="color:var(--sub);font-size:10px;text-align:center;">Пока нет ставок</p>';
  
  // Победитель
  if (room.lastWinner) {
    document.getElementById('winnerInfo').classList.add('active');
    document.getElementById('winnerAmountText').textContent = 'Победитель: ' + room.lastWinner.name + ' (+' + (room.lastWinner.amount || 0).toLocaleString() + ' мон.)';
  }
}

async function placeBet() {
  const amt = parseInt(document.getElementById('betAmount').value);
  if (!amt || amt < 1) return alert('Введи сумму');
  const res = await apiCall('/api/bet', { roomId: currentRoom, amount: amt });
  if (res.error) return alert(res.error);
  if (res.success) {
    balance -= amt;
    myBets[currentRoom] = (myBets[currentRoom] || 0) + amt;
    document.getElementById('betAmount').value = '';
    init();
  }
}

async function activatePromo() {
  const code = document.getElementById('promoInput').value.trim();
  if (!code) return;
  const res = await apiCall('/api/promo', { code });
  const msg = document.getElementById('promoMsg');
  if (res.error) {
    msg.textContent = res.error;
    msg.style.color = 'var(--red)';
  } else {
    msg.textContent = 'Промокод активирован! +' + res.bonus + ' монет';
    msg.style.color = 'var(--green)';
    balance += res.bonus;
    document.getElementById('promoInput').value = '';
    updateUI();
  }
}

async function loadLeaderboard() {
  try {
    const res = await fetch(API + '/api/leaderboard');
    const data = await res.json();
    let html = '';
    data.forEach((u, i) => {
      html += '<div class="lb-item"><span class="lb-pos">' + (i+1) + '</span><span class="lb-name">' + (u.username || '??') + '</span><span class="lb-balance">' + (u.balance || 0).toLocaleString() + '</span></div>';
    });
    document.getElementById('lbList').innerHTML = html || 'Нет данных';
  } catch(e) {
    document.getElementById('lbList').innerHTML = 'Ошибка загрузки';
  }
}

function switchRoom(room) {
  currentRoom = room;
  document.querySelectorAll('.room-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.room-tab')[{bomj:0,classic:1,major:2,hyena:3}[room]].classList.add('active');
  updateUI();
}

function switchPage(page) {
  document.getElementById('jackpotPage').style.display = page === 'jackpot' ? 'block' : 'none';
  document.getElementById('promoPage').classList.toggle('active', page === 'promo');
  document.getElementById('leaderboardPage').classList.toggle('active', page === 'leaderboard');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[['jackpot','promo','leaderboard'].indexOf(page)].classList.add('active');
  if (page === 'leaderboard') loadLeaderboard();
}

document.getElementById('betAmount').addEventListener('keydown', e => { if (e.key === 'Enter') placeBet(); });
document.getElementById('promoInput').addEventListener('keydown', e => { if (e.key === 'Enter') activatePromo(); });

init();
setInterval(init, 3000);
</script></body></html>
