<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SJ CASINO</title>
    <style>
        :root {
            --bg: #b0b0b0;
            --card: #d0d0d0;
            --accent: #7c6fd4;
            --accent2: #5a4fcf;
            --text: #1a1a1a;
            --sub: #4a4a4a;
            --gold: #c79100;
            --green: #2e7d32;
            --red: #c62828;
            --orange: #e65100;
            --blue: #1565c0;
            --border: #9e9e9e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .app { width: 100%; max-width: 420px; min-height: 100vh; display: flex; flex-direction: column; padding: 0 12px 100px; position: relative; background: var(--bg); }
        .top-divider { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px 6px; border-bottom: 1px solid rgba(0,0,0,0.1); min-height: 36px; background: #c0c0c0; }
        .top-left { display: flex; align-items: center; gap: 8px; }
        .top-logo-placeholder { font-size: 18px; font-weight: 900; color: #5a4fcf; }
        .top-right { display: flex; align-items: center; gap: 12px; }
        .notif-btn { position: relative; background: none; border: none; color: #444; cursor: pointer; padding: 4px; }
        .notif-btn svg { width: 18px; height: 18px; stroke: #444; fill: none; }
        .notif-badge { position: absolute; top: -2px; right: -2px; background: var(--red); color: #fff; font-size: 8px; width: 14px; height: 14px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
        .notif-badge.visible { display: flex; }
        .burger-btn { display: flex; flex-direction: column; gap: 4px; cursor: pointer; padding: 4px; background: none; border: none; }
        .burger-btn span { display: block; width: 20px; height: 2px; background: #444; border-radius: 2px; }
        .rooms { display: flex; gap: 5px; margin: 8px 0; }
        .room-tab { flex: 1; background: #c8c8c8; border: 1px solid #aaa; color: #444; padding: 9px 3px; border-radius: 10px; font-size: 10px; cursor: pointer; text-align: center; transition: 0.2s; font-weight: 600; }
        .room-tab.active { background: #d8d8ff; color: #5a4fcf; border-color: #5a4fcf; }
        .jackpot-header { text-align: center; margin-bottom: 2px; }
        .jackpot-title { font-size: 18px; font-weight: 800; color: #1a1a1a; }
        .jackpot-bank { font-size: 26px; font-weight: 900; color: #c79100; margin: 2px 0; }
        .jackpot-players { font-size: 10px; color: #4a4a4a; margin-bottom: 6px; }
        .timer-bar { background: #c0c0c0; border-radius: 10px; height: 5px; margin: 6px 0; overflow: hidden; }
        .timer-fill { height: 100%; background: #5a4fcf; border-radius: 10px; transition: width 1s linear; }
        .timer-text { text-align: center; font-size: 10px; color: #4a4a4a; margin-bottom: 4px; }
        .slot-container { position: relative; width: 100%; height: 70px; overflow: hidden; margin: 2px 0; background: rgba(0,0,0,0.05); border-radius: 8px; }
        .slot-pointer { position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%); width: 2px; z-index: 10; background: rgba(90,79,207,0.5); }
        .slot-track { display: flex; gap: 0; position: absolute; left: 0; top: 8px; }
        .slot-item { flex-shrink: 0; width: 40px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .slot-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; transition: transform 0.6s ease, opacity 0.5s ease; }
        .slot-avatar.flip { transform: rotateX(360deg); }
        .slot-avatar.dimmed { opacity: 0.25; }
        .winner-info { display: none; text-align: center; padding: 8px 0 4px; }
        .winner-info.active { display: block; }
        .winner-mini-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; margin: 0 auto; }
        .winner-text { font-size: 12px; margin-top: 4px; }
        .winner-amount { font-size: 18px; font-weight: 900; color: #c79100; }
        .bet-area { display: flex; gap: 6px; align-items: center; margin-top: 8px; }
        .bet-input { flex: 1; background: #d0d0d0; border: 1px solid #aaa; color: #1a1a1a; padding: 10px 12px; border-radius: 10px; font-size: 13px; text-align: center; }
        .bet-btn { background: #5a4fcf; color: #fff; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 18px; cursor: pointer; }
        .my-bet-info { font-size: 9px; color: #4a4a4a; margin-top: 3px; display: flex; justify-content: space-between; }
        .history-block { margin-top: 10px; background: #d0d0d0; border-radius: 12px; padding: 10px; border: 1px solid #aaa; max-height: 150px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 9px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .history-avatar { width: 20px; height: 20px; border-radius: 50%; background: #888; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: #fff; }
        .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: #c0c0c0; display: flex; justify-content: space-around; padding: 6px 6px 18px; border-top: 1px solid #aaa; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 8px; color: #555; cursor: pointer; background: none; border: none; }
        .nav-item.active { color: #5a4fcf; }
        .balance-bubble { position: absolute; top: -28px; left: 50%; transform: translateX(-50%); background: #d0d0d0; border: 1px solid #5a4fcf; border-bottom: none; border-radius: 12px 12px 0 0; padding: 4px 10px; font-size: 10px; font-weight: 700; color: #c79100; }
        .page { display: none; }
        .page.active { display: block; }
        .wallet-card, .bonus-card, .profile-card { background: #d0d0d0; border-radius: 16px; padding: 14px; margin-bottom: 10px; border: 1px solid #aaa; }
        .chat-panel { position: fixed; top: 0; right: -320px; width: 300px; height: 100vh; background: #c0c0c0; border-left: 1px solid #aaa; z-index: 200; transition: right 0.3s ease; display: flex; flex-direction: column; padding: 12px; }
        .chat-panel.open { right: 0; }
        .chat-messages { flex: 1; overflow-y: auto; }
        .chat-msg-body { background: #d8d8d8; border-radius: 10px; padding: 6px 10px; font-size: 11px; color: #1a1a1a; max-width: 200px; }
        .chat-input-row { display: flex; gap: 6px; margin-top: 8px; }
        .chat-input-row input { flex: 1; background: #d0d0d0; border: 1px solid #aaa; color: #1a1a1a; padding: 8px; border-radius: 8px; }
        .chat-input-row button { background: #5a4fcf; color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); z-index: 199; }
        .overlay.active { display: block; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 350; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #d0d0d0; border-radius: 16px; padding: 20px; border: 1px solid #aaa; width: 300px; }
        .admin-panel { position: fixed; top: 0; right: -360px; width: 340px; height: 100vh; background: #c0c0c0; border-left: 1px solid #aaa; z-index: 400; transition: right 0.3s ease; padding: 12px; overflow-y: auto; }
        .admin-panel.open { right: 0; }
        .flash-bg { animation: flashGold 0.4s ease 3; }
        @keyframes flashGold { 0%,100% { background: transparent; } 50% { background: rgba(199,145,0,0.2); } }
    </style>
</head>
<body>
<div class="app" id="appContainer">
    <div class="top-divider">
        <div class="top-left"><div class="top-logo-placeholder">SJ</div></div>
        <div class="top-right">
            <button class="notif-btn" onclick="toggleNotif()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                <span class="notif-badge" id="notifBadge">0</span>
            </button>
            <button class="burger-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        </div>
    </div>

    <div class="rooms" id="roomsBar">
        <button class="room-tab active" onclick="switchRoom('bomj')">Бомж<div class="limits">1-50</div></button>
        <button class="room-tab" onclick="switchRoom('classic')">Классик<div class="limits">10-500</div></button>
        <button class="room-tab" onclick="switchRoom('major')">Мажор<div class="limits">250-5K</div></button>
        <button class="room-tab" onclick="switchRoom('hyena')">Гиена<div class="limits">5K-25K</div></button>
    </div>

    <div class="page active" id="jackpotPage">
        <div class="jackpot-header">
            <div class="jackpot-title" id="roomTitle">Бомж</div>
            <div class="jackpot-bank" id="totalBank">0</div>
            <div class="jackpot-players" id="playerCount">Участников: 0</div>
        </div>
        <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
        <div class="timer-text" id="timerText">Загрузка...</div>
        <div class="slot-container" id="slotContainer">
            <div class="slot-pointer"></div>
            <div class="slot-track" id="slotTrack"></div>
        </div>
        <div class="winner-info" id="winnerInfo">
            <div class="winner-mini-avatar" id="winnerMiniAvatar"></div>
            <div class="winner-text">
                <div class="w-name" id="winnerNameText"></div>
                <div class="w-chance" id="winnerChanceText"></div>
            </div>
            <div class="winner-amount" id="winnerAmountText"></div>
        </div>
        <div class="bet-area">
            <input class="bet-input" type="number" id="betAmount" placeholder="Сумма ставки">
            <button class="bet-btn" onclick="placeBet()">&rarr;</button>
        </div>
        <div class="my-bet-info">
            <span>Ставка: <strong id="myBetDisplay">0</strong></span>
            <span>Баланс: <strong id="balanceDisplay">0</strong></span>
        </div>
        <div class="history-block">
            <h4>Участники</h4>
            <div id="historyList"></div>
        </div>
    </div>

    <div class="page" id="bonusPage"><div class="bonus-card"><h3>🎁 Бонус</h3><input class="bet-input" type="text" id="promoInput" placeholder="Промокод"><button class="bet-btn" onclick="activatePromo()" style="width:100%;margin-top:6px">Активировать</button><p style="font-size:10px;text-align:center;margin-top:4px" id="promoMsg"></p></div></div>
    <div class="page" id="walletPage"><div class="wallet-card"><h3>💰 Кошелёк</h3><p style="text-align:center;font-size:28px;font-weight:900;color:var(--gold)" id="walletBalance">0</p><button class="bet-btn" onclick="depositDemo()" style="width:100%;margin-top:8px">📥 Пополнить (демо +100)</button><button class="bet-btn" onclick="withdrawDemo()" style="width:100%;margin-top:4px;background:transparent;border:1px solid #aaa;color:#1a1a1a">📤 Вывести (демо)</button></div></div>
    <div class="page" id="profilePage"><div class="profile-card"><h3>👤 Профиль</h3><div class="profile-avatar" id="profileAvatar" style="background:#b8a9ff;width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;margin:0 auto">S</div><p style="text-align:center;font-weight:700;margin-top:8px" id="profileNickname">Player</p><div class="rank-bar"><div class="rank-fill" id="rankFill" style="height:18px;background:var(--green);width:0%;border-radius:9px"></div></div><p style="font-size:10px;color:var(--sub);text-align:center">Ставок: <strong id="statBets">0</strong> | Депозит: <strong id="statDeposit">0</strong></p></div></div>
    <div class="page" id="leaderboardPage"><div class="wallet-card"><h3>🏆 Топ</h3><div id="lbList">Загрузка...</div></div></div>
</div>

<div class="overlay" id="chatOverlay" onclick="closeAllPanels()"></div>
<div class="chat-panel" id="chatPanel">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><h3 style="color:var(--accent)">Чат</h3><button onclick="toggleChat()" style="background:none;border:none;color:#444;font-size:20px">&times;</button></div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row"><input type="text" id="chatInput" placeholder="Сообщение..." maxlength="200"><button onclick="sendMessage()">&rarr;</button></div>
</div>

<div class="modal-overlay" id="withdrawModal"><div class="modal-box">
    <button onclick="closeWithdrawModal()" style="position:absolute;top:8px;right:12px;background:none;border:none;color:#444;font-size:20px">&times;</button>
    <h4 style="color:var(--accent)">Вывод</h4>
    <input type="number" id="withdrawAmount" placeholder="Сумма (мин 1500)">
    <select id="withdrawMethod" onchange="onWithdrawMethodChange()"><option value="">Способ</option><option value="sbp">СБП</option><option value="card">Карта</option><option value="usdt">USDT</option><option value="ton">TON</option></select>
    <div id="withdrawMethodDetails"></div>
    <button class="bet-btn" onclick="requestWithdraw()" style="width:100%;margin-top:6px">Вывести</button>
    <p id="withdrawMsg" style="font-size:10px;text-align:center;margin-top:4px"></p>
</div></div>

<div class="notif-panel" id="notifPanel" style="position:fixed;top:0;right:-320px;width:300px;height:100vh;background:#c0c0c0;border-left:1px solid #aaa;z-index:210;transition:right 0.3s;padding:12px">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><h3 style="color:var(--accent)">Уведомления</h3><button onclick="toggleNotif()" style="background:none;border:none;color:#444;font-size:20px">&times;</button></div>
    <div id="notifList" style="flex:1;overflow-y:auto;font-size:10px;color:#1a1a1a"></div>
</div>

<div class="admin-panel" id="adminPanel">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px"><h3 style="color:var(--accent)">Админ</h3><button onclick="closeAdminPanel()" style="background:none;border:none;color:#444;font-size:20px">&times;</button></div>
    <div id="adminContent" style="font-size:10px;color:#1a1a1a;flex:1;overflow-y:auto"></div>
</div>

<div class="nav">
    <button class="nav-item active" onclick="switchPage('jackpot')">🎰 Игра</button>
    <button class="nav-item" onclick="switchPage('bonus')">🎁 Бонус</button>
    <button class="nav-item" onclick="switchPage('wallet')">💰 Кошелёк</button>
    <button class="nav-item" onclick="switchPage('profile')">👤 Профиль</button>
    <button class="nav-item" onclick="switchPage('leaderboard')">🏆 Топ</button>
    <button class="nav-item" onclick="toggleChat()">💬 Чат</button>
    <span class="balance-bubble" id="navBalance">0</span>
</div>

<script>
    // === Telegram Mini App ===
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor('bg_color');
        tg.isClosingConfirmationEnabled = true;
    }

    const API = 'https://sj-server-1.onrender.com';
    let userId = null, username = 'Player';
    if (tg?.initDataUnsafe?.user) {
        userId = tg.initDataUnsafe.user.id;
        username = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name || 'Player';
    } else {
        userId = 'demo_' + Math.floor(Math.random() * 1000000);
    }

    const ROOMS = { bomj: { name: 'Бомж', min: 1, max: 50 }, classic: { name: 'Классик', min: 10, max: 500 }, major: { name: 'Мажор', min: 250, max: 5000 }, hyena: { name: 'Гиена', min: 5000, max: 25000 } };
    const COLORS = ['#f87171','#fb923c','#fbbf24','#a3e635','#34d399','#22d3ee','#60a5fa','#a78bfa','#f472b6'];
    const NAMES = ['Crypto','TapMon','Lucky','TonRi','MegaT','GoldD','BigWi','FastC','CoinH'];
    const TICKETS_PER_COIN = 10, AVATAR_STEP = 10, HOUSE_FEE = 0.10;

    let currentRoom = 'bomj', balance = 0, myBet = 0, isSpinning = false, spinOffset = 0;
    let roomState = {
        bomj: { bank: 0, players: [], timer: 30, maxTimer: 30, lastWinner: null },
        classic: { bank: 0, players: [], timer: 30, maxTimer: 30, lastWinner: null },
        major: { bank: 0, players: [], timer: 30, maxTimer: 30, lastWinner: null },
        hyena: { bank: 0, players: [], timer: 30, maxTimer: 30, lastWinner: null }
    };
    let chatMessages = [];
    let notifications = [];
    let transactions = [], winnersHistory = [], totalBets = 0, totalDeposit = 0;
    let lastWinnerProcessed = {};

    function initName(name) { return (name || '??').substring(0,2).toUpperCase(); }

    async function apiCall(endpoint, data = {}) {
        try {
            const res = await fetch(API + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, username, ...data })
            });
            return await res.json();
        } catch(e) { return { error: 'Нет связи' }; }
    }

    async function fetchRooms() {
        try {
            const res = await fetch(API + '/api/rooms');
            const data = await res.json();
            for (const id in data) {
                roomState[id] = data[id];
                if (data[id].lastWinner) onNewWinner(id, data[id].lastWinner);
            }
            updateUI();
        } catch(e) {}
    }

    function onNewWinner(roomId, winnerData) {
        if (roomId !== currentRoom) return;
        const key = roomId + '_' + winnerData.ticket;
        if (lastWinnerProcessed[key]) return;
        lastWinnerProcessed[key] = true;
        doSpin(winnerData);
    }

    function doSpin(serverWinner) {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('winnerInfo').classList.remove('active');
        const s = roomState[currentRoom];
        let all = [...s.players];
        if (myBet > 0) all.push({ name: username, color: '#b8a9ff', bet: myBet, tickets: myBet * TICKETS_PER_COIN, isYou: true, userId });

        let winner = all.find(p => p.name === serverWinner.name && p.color === serverWinner.color);
        if (!winner) winner = all[0];

        const slotCountBefore = all.findIndex(p => p === winner) * Math.max(1, Math.floor(winner.tickets / AVATAR_STEP));
        const track = document.getElementById('slotTrack');
        const itemW = 40, viewCenter = (Math.min(window.innerWidth, 420) - 40) / 2;
        const startX = spinOffset;
        const extraDistance = 1000 + Math.floor(Math.random() * 800);
        spinOffset = startX - (slotCountBefore * itemW) + viewCenter - extraDistance;

        track.style.transition = 'none';
        track.style.transform = `translateX(${startX}px)`;
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                track.style.transition = `transform ${8 + Math.random() * 4}s cubic-bezier(.02,.95,.08,1)`;
                track.style.transform = `translateX(${spinOffset}px)`;
            });
        });

        setTimeout(() => {
            const avatars = document.querySelectorAll('.slot-avatar');
            let slotIdx = 0;
            for (const p of all) {
                const slots = Math.max(1, Math.floor(p.tickets / AVATAR_STEP));
                for (let i = 0; i < slots; i++) {
                    if (avatars[slotIdx + i]) {
                        avatars[slotIdx + i].classList.toggle('dimmed', p !== winner);
                    }
                }
                slotIdx += slots;
            }
            const winnerAv = document.querySelector('.slot-avatar:not(.dimmed)');
            if (winnerAv) {
                winnerAv.classList.add('flip');
                setTimeout(() => winnerAv.classList.remove('flip'), 700);
            }
            document.getElementById('winnerMiniAvatar').style.background = winner.color;
            document.getElementById('winnerMiniAvatar').textContent = initName(winner.name);
            document.getElementById('winnerNameText').textContent = winner.name;
            document.getElementById('winnerAmountText').textContent = `+${serverWinner.amount.toLocaleString()}`;
            document.getElementById('winnerInfo').classList.add('active');
            if (!winner.isBot && winner.userId === userId) {
                balance += serverWinner.amount;
                document.getElementById('appContainer').classList.add('flash-bg');
                setTimeout(() => document.getElementById('appContainer').classList.remove('flash-bg'), 1200);
            }
            myBet = 0;
            setTimeout(() => { isSpinning = false; }, 3000);
        }, 10000);
    }

    function updateUI() {
        const room = roomState[currentRoom];
        const cfg = ROOMS[currentRoom];
        document.getElementById('roomTitle').textContent = cfg.name;
        document.getElementById('totalBank').textContent = (room.bank || 0).toLocaleString();
        document.getElementById('playerCount').textContent = 'Участников: ' + (room.players ? room.players.length : 0);
        document.getElementById('timerFill').style.width = ((room.timer || 0) / (room.maxTimer || 30) * 100) + '%';
        document.getElementById('timerText').textContent = 'До розыгрыша: 0:' + String(room.timer || 0).padStart(2, '0');
        document.getElementById('myBetDisplay').textContent = myBet;
        document.getElementById('balanceDisplay').textContent = balance.toLocaleString();
        document.getElementById('walletBalance').textContent = balance.toLocaleString();
        document.getElementById('navBalance').textContent = balance.toLocaleString();
        document.getElementById('profileNickname').textContent = username;
        document.getElementById('profileAvatar').textContent = initName(username);
        document.getElementById('statBets').textContent = totalBets;
        document.getElementById('statDeposit').textContent = totalDeposit;

        let html = '';
        if (room.players) {
            for (const p of room.players) {
                html += `<div class="history-item"><div class="history-avatar" style="background:${p.color || '#888'}">${initName(p.name)}</div><div class="history-name">${p.name}</div><span>${(p.bet||0).toLocaleString()} мон.</span></div>`;
            }
        }
        document.getElementById('historyList').innerHTML = html || 'Нет ставок';
        renderNotifBadge();
    }

    async function placeBet() {
        const amt = parseInt(document.getElementById('betAmount').value);
        if (!amt || amt < 1) return alert('Введи сумму');
        const res = await apiCall('/api/bet', { roomId: currentRoom, amount: amt });
        if (res.error) return alert(res.error);
        balance -= amt;
        myBet += amt;
        document.getElementById('betAmount').value = '';
        fetchRooms();
    }

    function switchRoom(room) {
        currentRoom = room;
        myBet = 0;
        document.querySelectorAll('.room-tab').forEach((b, i) => b.classList.toggle('active', Object.keys(ROOMS)[i] === room));
        fetchRooms();
    }

    function switchPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const idx = {jackpot:0, bonus:1, wallet:2, profile:3, leaderboard:4, chat:5};
        document.querySelectorAll('.nav-item')[idx[page]]?.classList.add('active');
        if (page === 'leaderboard') loadLeaderboard();
    }

    function toggleChat() {
        document.getElementById('chatPanel').classList.toggle('open');
        document.getElementById('chatOverlay').classList.toggle('active');
        if (document.getElementById('chatPanel').classList.contains('open')) fetchChatMessages();
    }

    function toggleNotif() {
        document.getElementById('notifPanel').classList.toggle('open');
        renderNotifList();
    }

    function toggleMenu() { /* пока заглушка */ }
    function closeAllPanels() {
        document.getElementById('chatPanel').classList.remove('open');
        document.getElementById('chatOverlay').classList.remove('active');
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text || text.length > 200) return;
        await apiCall('/api/chat/send', { text });
        input.value = '';
        fetchChatMessages();
    }

    async function fetchChatMessages() {
        try {
            const res = await fetch(API + '/api/chat/messages?limit=50');
            chatMessages = await res.json();
            const container = document.getElementById('chatMessages');
            container.innerHTML = chatMessages.map(m => {
                const isMe = (m.userId === userId);
                return `<div style="display:flex;gap:6px;margin-bottom:4px">
                    <div style="width:22px;height:22px;border-radius:50%;background:${isMe?'#b8a9ff':'#888'};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff">${initName(m.username)}</div>
                    <div class="chat-msg-body">${escapeHtml(m.text)}</div>
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        } catch(e) {}
    }

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    function addNotification(text) {
        notifications.unshift({ text, time: new Date().toLocaleTimeString() });
        if (notifications.length > 50) notifications.pop();
        renderNotifBadge();
    }

    function renderNotifBadge() {
        const badge = document.getElementById('notifBadge');
        badge.textContent = notifications.length;
        badge.classList.toggle('visible', notifications.length > 0);
    }

    function renderNotifList() {
        document.getElementById('notifList').innerHTML = notifications.map(n => `<div style="padding:4px 0;border-bottom:1px solid rgba(0,0,0,0.1)">${n.text}<div style="font-size:8px;color:var(--sub)">${n.time}</div></div>`).join('') || 'Нет уведомлений';
    }

    async function activatePromo() {
        const code = document.getElementById('promoInput').value.trim();
        const res = await apiCall('/api/promo', { code });
        const msg = document.getElementById('promoMsg');
        if (res.error) { msg.textContent = res.error; msg.style.color = 'var(--red)'; }
        else { msg.textContent = 'Активирован! +' + res.bonus; msg.style.color = 'var(--green)'; balance += res.bonus; fetchRooms(); }
    }

    async function loadLeaderboard() {
        try {
            const res = await fetch(API + '/api/leaderboard');
            const data = await res.json();
            document.getElementById('lbList').innerHTML = data.map((u,i) => `<div style="display:flex;justify-content:space-between;padding:4px 0"><span>${i+1}. ${u.username||'??'}</span><span style="color:var(--gold)">${(u.balance||0).toLocaleString()}</span></div>`).join('') || 'Нет данных';
        } catch(e) {}
    }

    function depositDemo() { balance += 100; fetchRooms(); addNotification('+100 монет (демо)'); }
    function withdrawDemo() { if (balance >= 100) { balance -= 100; fetchRooms(); addNotification('-100 монет (демо)'); } else alert('Минимум 100'); }
    function closeWithdrawModal() { document.getElementById('withdrawModal').classList.remove('active'); }
    function openAdminPanel() { document.getElementById('adminPanel').classList.add('open'); }
    function closeAdminPanel() { document.getElementById('adminPanel').classList.remove('open'); }

    setInterval(fetchRooms, 5000);
    setInterval(fetchChatMessages, 3000);
    fetchRooms();
</script>
</body>
</html>
